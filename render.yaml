databases:
  - name: voca-db
    plan: basic-256mb
    databaseName: voca

services:
  - type: web
    name: voca
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: SITE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: voca-db
          property: connectionString
