<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voca | Регистрация</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-pending" data-guest-only>
  <header class="navbar">
    <div class="navbar-inner">
      <a class="logo" href="/index.html">Voca</a>
      <nav class="nav-links">
        <a href="/index.html">Главная</a>
        <a class="active" data-guest-only href="/register.html">Регистрация</a>
        <a data-guest-only href="/login.html">Вход</a>
        <a data-auth-only hidden href="/ideas.html">Идеи</a>
        <a data-auth-only hidden href="/tasks.html">Задачи</a>
        <a data-auth-only hidden href="/profile.html">Профиль</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card auth-card fade-in">
      <div class="feature-icon">📝</div>
      <h1 class="page-title">Создание аккаунта</h1>
      <p class="page-subtitle">Зарегистрируйтесь, чтобы сохранять идеи, вести задачи и отслеживать свой прогресс.</p>

      <div class="soft-divider"></div>

      <div class="input-group">
        <label for="username">Логин</label>
        <input type="text" id="username" placeholder="Введите логин" />
      </div>

      <div class="input-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль" minlength="6" />
        <p class="small-text password-hint">Минимум 6 символов: хотя бы одна буква и одна цифра.</p>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" onclick="register()">Зарегистрироваться</button>
      </div>

      <p class="small-text">Уже есть аккаунт? <a href="/login.html" style="color:#2563eb;">Войти</a></p>

    </div>
  </main>

  <script src="/script.js"></script>
  <script>
    async function register() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const passwordPattern = /^(?=.*[A-Za-z])(?=.*\d).{6,}$/;

      if (!passwordPattern.test(password)) {
        showToast('Пароль должен содержать минимум 6 символов, включая буквы и цифры.', 'warning');
        return;
      }

      const response = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (response.ok) {
        showToast('Аккаунт успешно создан.', 'success');
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 900);
        return;
      }

      showToast(data.message, 'error');
    }
  </script>
</body>
</html>
